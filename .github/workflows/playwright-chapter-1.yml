name: Playwright E2E Tests (Chapter 1)

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Number of workers (Use 1 for sequential, 4 for parallel)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '4'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/learning/apps/chapter-1

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test --workers=${{ github.event.inputs.workers }}

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-html-report
        path: apps/learning/apps/chapter-1/reports/html/
        retention-days: 14

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: apps/learning/apps/chapter-1/reports/allure-results/
        retention-days: 14
