<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1920px;
      background-color: #212121;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      width: 100%;
      height: 380px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      text-align: center;
      padding-bottom: 50px;
    }
    .title {
      font-size: 72px;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 42px;
      font-weight: 400;
      color: #b0b0b0;
      margin-top: 24px;
      margin-left: 64px;
      margin-right: 64px;
      line-height: 1.4;
    }
    .device-container {
      flex: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-top: 20px;
    }
    .screenshot {
      width: 820px;
      border-radius: 48px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
      border: 12px solid #333333;
      object-fit: cover;
      object-position: top center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title" id="titleText">Title</div>
    <div class="subtitle" id="subtitleText">Subtitle</div>
  </div>
  <div class="device-container">
    <img id="screenshotImage" class="screenshot">
  </div>
</body>
</html>
